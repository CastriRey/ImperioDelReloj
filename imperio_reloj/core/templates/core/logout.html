<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación - Imperio del Reloj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card" style="width: 400px;">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Confirmación de Cierre de Sesión</h5>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de que deseas cerrar sesión?</p>
            </div>
            <div class="card-footer d-flex justify-content-end gap-2">
                <a href="/dashboard/" class="btn btn-secondary">Cancelar</a>
                <button class="btn btn-danger" onclick="confirmarLogout()">Cerrar Sesión</button>
            </div>
        </div>
    </div>
    <script>
        function confirmarLogout() {
            // Limpiar tokens del localStorage
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('usuario');
            // Limpiar información del usuario
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_primer_apellido');
            localStorage.removeItem('user_correo');
            localStorage.removeItem('user_perfil');
            document.cookie = 'user_id=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            // Redirigir a login
            window.location.href = '/login/';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
