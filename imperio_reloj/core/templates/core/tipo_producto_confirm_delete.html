<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Tipo de Producto - Imperio del Reloj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <script>
        // Verificar autenticación: si no hay tokens, redirigir a login
        function verificarAutenticacion() {
            const accessToken = localStorage.getItem('access_token');
            const refreshToken = localStorage.getItem('refresh_token');
            if (!accessToken || !refreshToken) {
                window.location.href = '/login/';
            }
        }
        verificarAutenticacion();
    </script>

    <!-- Barra de navegación -->
    {% include "core/nav.html" %}

    <!-- Contenedor con el formulario de confirmación -->
    <div class="container mt-5">
        <!-- Tarjeta de confirmación de eliminación -->
        <div class="card border-danger" style="max-width: 500px; margin: 0 auto;">
            <div class="card-header bg-danger text-white">
                <h5>Confirmar Eliminación</h5>
            </div>
            <div class="card-body">
                <!-- Mensaje de advertencia indicando qué se va a eliminar -->
                <p>¿Está seguro de que desea eliminar este tipo de producto?</p>
                
                <!-- Información del tipo de producto a eliminar -->
                <div class="alert alert-warning">
                    <strong>Tipo de Producto:</strong> {{ tipo.nombre_tipo_producto }}<br>
                    <strong>Código:</strong> {{ tipo.codigo_tipo_producto }}
                </div>

                <!-- Advertencia importante sobre la eliminación permanente -->
                <p class="text-danger"><strong>Esta acción no se puede deshacer.</strong></p>
            </div>
            <div class="card-footer d-flex gap-2">
                <!-- Formulario POST para confirmar la eliminación -->
                <form method="post" style="flex: 1;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger w-100">Eliminar Definitivamente</button>
                </form>
                <!-- Botón para cancelar la eliminación -->
                <a href="{% url 'tipos_producto_list' %}" class="btn btn-secondary flex-grow-1">Cancelar</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
