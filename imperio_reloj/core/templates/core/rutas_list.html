<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutas - Imperio del Reloj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <script>
        function verificarAutenticacion() {
            const accessToken = localStorage.getItem('access_token');
            const refreshToken = localStorage.getItem('refresh_token');
            if (!accessToken || !refreshToken) {
                window.location.href = '/login/';
            }
        }
        verificarAutenticacion();
    </script>
    {% include "core/nav.html" %}
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="{% url 'seguridad' %}" class="btn btn-outline-secondary">← Volver</a>
            <h1 class="mb-0">Lista de Rutas</h1>
            <a href="{% url 'ruta_create' %}" class="btn btn-primary">Crear Nueva Ruta</a>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>URL</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for ruta in rutas %}
                <tr>
                    <td>{{ ruta.codigo_ruta }}</td>
                    <td>{{ ruta.nombre_ruta }}</td>
                    <td>{{ ruta.url_ruta }}</td>
                    <td>
                        <a href="{% url 'ruta_edit' ruta.codigo_ruta %}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="{% url 'ruta_delete' ruta.codigo_ruta %}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
