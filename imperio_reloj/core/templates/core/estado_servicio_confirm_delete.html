<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Estado de Servicio - Imperio del Reloj</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<script>
function verificarAutenticacion() {
    const accessToken = localStorage.getItem('access_token');
    const refreshToken = localStorage.getItem('refresh_token');
    if (!accessToken || !refreshToken) { window.location.href = '/login/'; }
}
verificarAutenticacion();
</script>
{% include "core/nav.html" %}
<div class="container mt-5">
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
            <h2 class="mt-3">Confirmar eliminación</h2>
            <p class="text-muted">Vas a eliminar este estado de servicio.</p>
        </div>
        <div class="mb-4">
            <p><strong>Código:</strong> {{ estado.codigo_estado_servicio }}</p>
            <p><strong>Nombre:</strong> {{ estado.nombre_estado_reparacion }}</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-danger">Eliminar Estado</button>
                <a href="{% url 'estados_servicio_list' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
