<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Imperio del Reloj{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <script>
        // Verificar que el usuario esté autenticado cuando carga una página protegida
        function verificarAutenticacion() {
            const accessToken = localStorage.getItem('access_token');
            const refreshToken = localStorage.getItem('refresh_token');
            
            // Si no hay tokens, redirigir a login
            if (!accessToken || !refreshToken) {
                window.location.href = '/login/';
            }
        }
        
        // Llamar la verificación al cargar la página
        verificarAutenticacion();
    </script>
    
    {% include "core/nav.html" %}
    
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
